version: '3.8'

services:
  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projetods_backend
    restart: always
    ports:
      - "3333:3000"
    env_file:
      - ./backend/.env
    environment:
      # Valores padrão usados se o .env não existir — TROQUE JWT_SECRET em produção!
      - DATABASE_URL=${DATABASE_URL:-file:./prisma/dev.db}
      - JWT_SECRET=${JWT_SECRET:-troque-este-segredo-em-producao}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080,http://localhost:5173}
    volumes:
      - sqlite_data:/app/prisma

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projetods_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  sqlite_data: