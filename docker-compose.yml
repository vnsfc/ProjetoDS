version: '3.8'

services:
  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projetods_backend
    restart: always
    ports:
      - "3333:3000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:-troque-este-segredo-em-producao}
      # Domínio de produção liberado no CORS
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080,http://localhost:5173,https://clinicasdigitais.cin.ufpe.br}
    volumes:
      - ./backend/prisma:/app/prisma

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projetods_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend