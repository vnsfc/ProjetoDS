version: '3.8'

services:
  # 1. Nginx (Único ponto de entrada)
  nginx:
    image: nginx:alpine
    container_name: projetods_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

  # 2. Backend (API Node.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projetods_backend
    restart: always
    expose:
      - "3000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:-troque-este-segredo-em-producao}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost,https://clinicasdigitais.cin.ufpe.br}
    volumes:
      - ./backend/prisma:/app/prisma

  # 3. Frontend (React/Vite Preview)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projetods_frontend
    restart: always
    expose:
      - "8080"
    depends_on:
      - backend