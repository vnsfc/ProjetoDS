services:
  # 1. Backend (API Node.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projeto-7-backend
    restart: unless-stopped
    ports:
      - "3007:3000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost,https://clinicasdigitais.cin.ufpe.br, http://vm-clindig.cin.ufpe.br}
    volumes:
      - ./backend/prisma:/app/prisma
    networks:
      - cin_proxy

  # 2. Frontend (React/Vite Preview)
  frontend:
    build:
      context: ./frontend
    container_name: projeto-7-frontend
    volumes:
      - /opt/docker/frontends/projeto7:/output
    restart: no
    depends_on:
      - backend

networks:
  cin_proxy:
    external: true
