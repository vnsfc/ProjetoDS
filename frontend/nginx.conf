server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 1. Rota para o frontend SPA no subdiretório /ho
    location /ho {
        try_files $uri $uri/ /ho/index.html;
    }

    # Redireciona acessos na raiz direto para a clínica
    location = / {
        return 301 /ho;
    }

    # Captura as requisições que chegam no domínio e direciona ao backend
    location ~ ^/ho/(auth|usuarios|prontuarios|agenda|fila|ofertas|dashboard)(/.*)?$ {
        rewrite ^/ho/(.*)$ /$1 break;
        
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
