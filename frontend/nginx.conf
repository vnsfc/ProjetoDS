server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — rotas desconhecidas caem no index.html (React Router cuida do resto)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy de todas as rotas da API para o container backend
    # O nome "backend" é resolvido pelo DNS interno do Docker Compose
    location ~ ^/(auth|usuarios|prontuarios|agenda|fila|ofertas|dashboard)(/.*)?$ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
